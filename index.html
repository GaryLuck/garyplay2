<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>15-Tile Puzzle</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg: #1a1a2e;
    --text: #eee;
    --accent: #e94560;
    --board-bg: #16213e;
    --tile-bg: linear-gradient(135deg, #0f3460, #533483);
    --tile-text: #fff;
    --divider: #0f3460;
    --muted: #aaa;
    --win-color: #4ecca3;
  }

  /* Dark Midnight (default) */
  [data-theme="midnight"] {
    --bg: #1a1a2e;
    --text: #eee;
    --accent: #e94560;
    --board-bg: #16213e;
    --tile-bg: linear-gradient(135deg, #0f3460, #533483);
    --tile-text: #fff;
    --divider: #0f3460;
    --muted: #aaa;
    --win-color: #4ecca3;
  }

  /* Dark Emerald */
  [data-theme="emerald"] {
    --bg: #0d1b2a;
    --text: #e0e0e0;
    --accent: #00b4d8;
    --board-bg: #1b2838;
    --tile-bg: linear-gradient(135deg, #023e58, #065a60);
    --tile-text: #e0fbfc;
    --divider: #023e58;
    --muted: #90a4ae;
    --win-color: #80ed99;
  }

  /* Beige & Brown */
  [data-theme="beige"] {
    --bg: #f5f0e8;
    --text: #3e2c1c;
    --accent: #a0522d;
    --board-bg: #e8dcc8;
    --tile-bg: linear-gradient(135deg, #8b5e3c, #6b3a2a);
    --tile-text: #fff8f0;
    --divider: #c4a882;
    --muted: #7a6652;
    --win-color: #2e7d32;
  }

  /* Bright */
  [data-theme="bright"] {
    --bg: #fafaff;
    --text: #222;
    --accent: #ff4081;
    --board-bg: #e8eaf6;
    --tile-bg: linear-gradient(135deg, #7c4dff, #ff4081);
    --tile-text: #fff;
    --divider: #c5cae9;
    --muted: #666;
    --win-color: #00c853;
  }

  html, body {
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    touch-action: none;
  }

  .container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 12px 8px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 6px;
    text-align: center;
    color: var(--accent);
  }

  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 8px;
    font-size: 15px;
  }

  .stats span {
    font-weight: 600;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 4px;
    width: min(82vw, 320px);
    height: min(82vw, 320px);
    background: var(--board-bg);
    border-radius: 10px;
    padding: 6px;
    flex-shrink: 0;
  }

  .tile {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--tile-bg);
    color: var(--tile-text);
    font-size: 26px;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s ease;
  }

  .tile:active {
    transform: scale(0.95);
  }

  .tile.empty {
    background: transparent;
    cursor: default;
  }

  .tile.empty:active {
    transform: none;
  }

  .buttons {
    display: flex;
    gap: 12px;
    margin: 10px 0;
  }

  button {
    padding: 8px 20px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
  }

  button:active {
    opacity: 0.8;
  }

  .theme-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .theme-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    padding: 0;
    transition: border-color 0.2s;
  }

  .theme-btn.active {
    border-color: var(--text);
  }

  .theme-btn[data-set-theme="midnight"] {
    background: linear-gradient(135deg, #1a1a2e, #533483);
  }

  .theme-btn[data-set-theme="emerald"] {
    background: linear-gradient(135deg, #0d1b2a, #065a60);
  }

  .theme-btn[data-set-theme="beige"] {
    background: linear-gradient(135deg, #f5f0e8, #8b5e3c);
  }

  .theme-btn[data-set-theme="bright"] {
    background: linear-gradient(135deg, #7c4dff, #ff4081);
  }

  .leaderboard {
    width: min(82vw, 320px);
    background: var(--board-bg);
    border-radius: 10px;
    padding: 10px 14px;
    flex-shrink: 0;
  }

  .leaderboard h2 {
    font-size: 16px;
    margin-bottom: 6px;
    color: var(--accent);
    text-align: center;
  }

  .leaderboard ol {
    list-style: none;
    counter-reset: rank;
    padding: 0;
  }

  .leaderboard li {
    counter-increment: rank;
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--divider);
  }

  .leaderboard li:last-child {
    border-bottom: none;
  }

  .leaderboard li::before {
    content: counter(rank) ".";
    margin-right: 8px;
    color: var(--accent);
    font-weight: 600;
    min-width: 20px;
  }

  .leaderboard .entry-moves {
    color: var(--muted);
  }

  .leaderboard .empty-msg {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 8px 0;
  }

  .win-msg {
    display: none;
    font-size: 18px;
    font-weight: 700;
    color: var(--win-color);
    margin: 6px 0;
    text-align: center;
  }

  .win-msg.show {
    display: block;
  }
</style>
</head>
<body>
<div class="container">
  <h1>15-Tile Puzzle</h1>
  <div class="stats">
    <div>Moves: <span id="moves">0</span></div>
    <div>Time: <span id="timer">0:00</span></div>
  </div>
  <div class="theme-buttons">
    <button class="theme-btn active" data-set-theme="midnight" title="Midnight" aria-label="Switch to Midnight theme"></button>
    <button class="theme-btn" data-set-theme="emerald" title="Emerald" aria-label="Switch to Emerald theme"></button>
    <button class="theme-btn" data-set-theme="beige" title="Beige & Brown" aria-label="Switch to Beige and Brown theme"></button>
    <button class="theme-btn" data-set-theme="bright" title="Bright" aria-label="Switch to Bright theme"></button>
  </div>
  <div class="board" id="board"></div>
  <div class="win-msg" id="winMsg">🎉 You solved it!</div>
  <div class="buttons">
    <button onclick="newGame()">New Game</button>
  </div>
  <div class="leaderboard">
    <h2>🏆 Leaderboard</h2>
    <div id="leaderboard-list"></div>
  </div>
</div>

<script>
  const BOARD_SIZE = 4;
  const TOTAL_TILES = BOARD_SIZE * BOARD_SIZE;
  let tiles = [];
  let emptyIndex = TOTAL_TILES - 1;
  let moves = 0;
  let timerInterval = null;
  let seconds = 0;
  let gameWon = false;

  function isSolvable(arr) {
    let inversions = 0;
    const flat = arr.filter(v => v !== 0);
    for (let i = 0; i < flat.length; i++) {
      for (let j = i + 1; j < flat.length; j++) {
        if (flat[i] > flat[j]) inversions++;
      }
    }
    const emptyRow = Math.floor(arr.indexOf(0) / BOARD_SIZE);
    const emptyRowFromBottom = BOARD_SIZE - emptyRow;
    // For even-sized boards: solvable if (blank on odd row from bottom + even inversions)
    // or (blank on even row from bottom + odd inversions)
    if (emptyRowFromBottom % 2 === 1) {
      return inversions % 2 === 0;
    } else {
      return inversions % 2 === 1;
    }
  }

  function shuffle() {
    do {
      tiles = Array.from({ length: TOTAL_TILES - 1 }, (_, i) => i + 1);
      tiles.push(0);
      for (let i = tiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
      }
    } while (!isSolvable(tiles) || isWin());
    emptyIndex = tiles.indexOf(0);
  }

  function isWin() {
    for (let i = 0; i < TOTAL_TILES - 1; i++) {
      if (tiles[i] !== i + 1) return false;
    }
    return tiles[TOTAL_TILES - 1] === 0;
  }

  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    tiles.forEach((val, idx) => {
      const tile = document.createElement('div');
      tile.className = 'tile' + (val === 0 ? ' empty' : '');
      tile.textContent = val === 0 ? '' : val;
      if (val !== 0) {
        tile.addEventListener('click', () => moveTile(idx));
      }
      board.appendChild(tile);
    });
  }

  function moveTile(idx) {
    if (gameWon) return;
    const row = Math.floor(idx / BOARD_SIZE);
    const col = idx % BOARD_SIZE;
    const emptyRow = Math.floor(emptyIndex / BOARD_SIZE);
    const emptyCol = emptyIndex % BOARD_SIZE;
    const isAdjacent =
      (Math.abs(row - emptyRow) + Math.abs(col - emptyCol)) === 1;

    if (!isAdjacent) return;

    [tiles[idx], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[idx]];
    emptyIndex = idx;
    moves++;
    document.getElementById('moves').textContent = moves;

    if (moves === 1) startTimer();

    render();

    if (isWin()) {
      gameWon = true;
      stopTimer();
      document.getElementById('winMsg').classList.add('show');
      saveScore(moves, seconds);
      renderLeaderboard();
    }
  }

  function startTimer() {
    if (timerInterval) return;
    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      document.getElementById('timer').textContent =
        m + ':' + String(s).padStart(2, '0');
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function saveScore(moveCount, timeSeconds) {
    const scores = JSON.parse(localStorage.getItem('puzzle15_scores') || '[]');
    const m = Math.floor(timeSeconds / 60);
    const s = timeSeconds % 60;
    scores.push({
      moves: moveCount,
      time: m + ':' + String(s).padStart(2, '0'),
      timeSeconds: timeSeconds,
      date: new Date().toLocaleDateString()
    });
    scores.sort((a, b) => a.moves - b.moves || a.timeSeconds - b.timeSeconds);
    if (scores.length > 10) scores.length = 10;
    localStorage.setItem('puzzle15_scores', JSON.stringify(scores));
  }

  function renderLeaderboard() {
    const scores = JSON.parse(localStorage.getItem('puzzle15_scores') || '[]');
    const container = document.getElementById('leaderboard-list');
    if (scores.length === 0) {
      container.innerHTML = '<div class="empty-msg">No scores yet. Solve the puzzle!</div>';
      return;
    }
    const ol = document.createElement('ol');
    scores.forEach(s => {
      const li = document.createElement('li');
      li.innerHTML =
        '<span>' + s.moves + ' moves — ' + s.time + '</span>' +
        '<span class="entry-moves">' + s.date + '</span>';
      ol.appendChild(li);
    });
    container.innerHTML = '';
    container.appendChild(ol);
  }

  function newGame() {
    stopTimer();
    moves = 0;
    seconds = 0;
    gameWon = false;
    document.getElementById('moves').textContent = '0';
    document.getElementById('timer').textContent = '0:00';
    document.getElementById('winMsg').classList.remove('show');
    shuffle();
    render();
  }

  // Theme switching
  const VALID_THEMES = ['midnight', 'emerald', 'beige', 'bright'];

  function setTheme(theme) {
    if (!VALID_THEMES.includes(theme)) theme = 'midnight';
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('puzzle15_theme', theme);
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-set-theme') === theme);
    });
  }

  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => setTheme(btn.getAttribute('data-set-theme')));
  });

  // Load saved theme
  setTheme(localStorage.getItem('puzzle15_theme') || 'midnight');

  // Prevent pull-to-refresh and bounce scrolling on the whole page
  document.addEventListener('touchmove', function (e) {
    e.preventDefault();
  }, { passive: false });

  newGame();
  renderLeaderboard();
</script>
</body>
</html>
